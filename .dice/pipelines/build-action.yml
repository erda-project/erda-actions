version: "1.1"
stages:
  - stage:
      - git-checkout:
          description: 代码仓库克隆
          params:
            branch: ((branch))
            depth: 1
            uri: ((remote.origin))
  - stage:
      - custom-script:
          description: 运行自定义命令
          commands:
            - cd ${git-checkout}
            - docker login "${DOCKER_REGISTRY_ERDA_ACTIONS}" -u "${DOCKER_REGISTRY_ERDA_ACTIONS_USERNAME}" -p "${DOCKER_REGISTRY_ERDA_ACTIONS_PASSWORD}"
            - make DOCKER_BUILDKIT=1 VERSION='1.0' release
          resources:
            cpu: 0.5
            mem: 2048
